<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password · 4FORE League</title>
<link rel="stylesheet" href="assets/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--color-bg-cream); }
.forgot-wrap { width:100%; max-width:440px; padding:24px; }
.forgot-logo { font-family:var(--font-display); font-size:1.8rem; color:var(--color-green); letter-spacing:0.05em; margin-bottom:32px; text-align:center; }
.forgot-logo span { color:var(--color-gold); }
.state { display:none; }
.state.active { display:block; }
.success-icon { width:56px; height:56px; background:var(--color-green-tint); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
.back-link { font-size:0.85rem; color:var(--color-muted); text-decoration:none; display:inline-flex; align-items:center; gap:6px; margin-top:16px; }
.back-link:hover { color:var(--color-green); }
</style>
</head>
<body>

<div class="forgot-wrap">
  <a href="index.html" class="forgot-logo">4<span>FORE</span> LEAGUE</a>

  <div class="card">
  <!-- Request form -->
  <div id="form-state">
    <h1 class="card-title">Reset password</h1>
    <p class="card-sub">Enter the email address linked to your account and we'll send you a reset link.</p>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      <p class="field-error" id="email-err"></p>
    </div>

    <button class="btn-submit" id="btn-reset">Send reset link</button>
    <a href="login.html" class="back-link">← Back to sign in</a>
  </div>

  <!-- Success state -->
  <div class="success-state" id="success-state">
    <div class="success-icon">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M4 14L10 20L24 6" stroke="#1B3D2A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2 class="success-title">Check your email</h2>
    <p class="success-body">We've sent a password reset link to <strong id="sent-email"></strong>. Check your inbox and follow the link to set a new password.</p>
    <p style="font-size:0.82rem; color:var(--color-muted);">Didn't get it? Check your spam folder, or <button onclick="resetForm()" style="background:none;border:none;color:var(--color-green);cursor:pointer;font-size:0.82rem;font-family:'DM Sans',sans-serif;font-weight:500;padding:0;">try again</button>.</p>
  </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btn-reset').addEventListener('click', handleReset);
  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleReset();
  });
});

async function handleReset() {
  const email = document.getElementById('email').value.trim();

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    const el = document.getElementById('email-err');
    el.textContent = 'Enter a valid email address.';
    el.style.display = 'block';
    return;
  }

  document.getElementById('email-err').style.display = 'none';

  const btn = document.getElementById('btn-reset');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  const { error } = await auth.sendPasswordReset(email);

  if (error) {
    showToast(error.message);
    btn.disabled = false;
    btn.textContent = 'Send reset link';
    return;
  }

  // Also send via Resend for branded email
  await auth.sendEmail('password-reset', email, { name: email.split('@')[0] });

  document.getElementById('sent-email').textContent = email;
  document.getElementById('form-state').style.display = 'none';
  document.getElementById('success-state').style.display = 'block';
}

function resetForm() {
  document.getElementById('form-state').style.display = 'block';
  document.getElementById('success-state').style.display = 'none';
  const btn = document.getElementById('btn-reset');
  btn.disabled = false;
  btn.textContent = 'Send reset link';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}
</script>
</body>
</html>
