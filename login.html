<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In · 4FORE League</title>
<link rel="stylesheet" href="assets/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<style>
body { display:flex; min-height:100vh; }
.panel-brand { width:42%; background:var(--color-green); display:flex; flex-direction:column; justify-content:center; padding:60px 48px; }
.panel-form  { flex:1; display:flex; align-items:center; justify-content:center; padding:48px 40px; background:var(--color-bg-cream); }
.brand-logo  { font-family:var(--font-display); font-size:2.2rem; color:var(--color-gold); letter-spacing:0.05em; margin-bottom:32px; }
.brand-logo span { color:#3ddc84; }
.brand-headline { font-family:var(--font-display); font-size:2.6rem; color:white; letter-spacing:0.02em; line-height:1.1; margin-bottom:16px; }
.brand-body { font-size:0.95rem; color:rgba(245,240,232,0.65); line-height:1.6; max-width:320px; }
.brand-features { list-style:none; margin-top:24px; display:flex; flex-direction:column; gap:10px; }
.brand-features li { font-size:0.88rem; color:rgba(245,240,232,0.75); display:flex; align-items:center; gap:10px; }
.brand-features li::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--color-gold); flex-shrink:0; }
.form-wrap  { width:100%; max-width:400px; }
.form-title { font-family:var(--font-display); font-size:2rem; color:var(--color-green); letter-spacing:0.03em; margin-bottom:4px; }
.form-sub   { font-size:0.88rem; color:var(--color-muted); margin-bottom:32px; }
.form-footer { font-size:0.85rem; color:var(--color-muted); margin-top:20px; text-align:center; }
.form-footer a { color:var(--color-green); font-weight:600; }
.form-divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--color-muted); font-size:0.82rem; }
.form-divider::before, .form-divider::after { content:''; flex:1; height:1px; background:var(--color-border); }
.forgot-link { font-size:0.82rem; color:var(--color-muted); float:right; margin-top:4px; }
.forgot-link:hover { color:var(--color-green); }
@media (max-width:768px) { .panel-brand { display:none; } .panel-form { padding:40px 24px; } }
</style>
</head>
<body>

<!-- LEFT -->
<div class="panel-brand">
  <a href="index.html" class="brand-logo">4<span>FORE</span></a>
  <h1 class="brand-headline">Good to<br>have you back.</h1>
  <p class="brand-body">Your rounds, your league, your leaderboard. Sign in and pick up where you left off.</p>
</div>

<!-- RIGHT -->
<div class="panel-form">
  <div class="form-wrap">

    <h1 class="form-title">Sign in</h1>
    <p class="form-sub">New here? <a href="signup.html">Create a free account</a></p>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      <p class="field-error" id="email-err"></p>
    </div>

    <div class="field">
      <div class="field-row">
        <label>Password</label>
        <a href="forgot-password.html">Forgot password?</a>
      </div>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
      <p class="field-error" id="pw-err"></p>
    </div>

    <button class="btn-submit" id="btn-signin">Sign In</button>

    <div class="form-divider">or</div>

    <p class="form-footer">Don't have an account? <a href="signup.html">Sign up free</a></p>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  await auth.redirectIfAuthed('index.html');

  document.getElementById('btn-signin').addEventListener('click', handleSignIn);

  ['email', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSignIn();
    });
  });
});

async function handleSignIn() {
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('password').value;
  let ok = true;

  if (!email) {
    showErr('email-err', 'Enter your email.');
    ok = false;
  } else { showErr('email-err', ''); }

  if (!pw) {
    showErr('pw-err', 'Enter your password.');
    ok = false;
  } else { showErr('pw-err', ''); }

  if (!ok) return;

  const btn = document.getElementById('btn-signin');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const { error } = await auth.signIn(email, pw);

  if (error) {
    if (error.message?.toLowerCase().includes('email not confirmed')) {
      sessionStorage.setItem('pending_verification_email', email);
      window.location.href = 'confirm-email.html';
      return;
    }
    showToast(error.message === 'Invalid login credentials'
      ? 'Incorrect email or password.'
      : error.message);
    btn.disabled = false;
    btn.textContent = 'Sign In';
    return;
  }

  // First-time welcome email trigger (best-effort)
  const user = await auth.getUser();
  if (user) {
    const { data: profile } = await auth.getProfile(user.id);
    if (!profile?.first_login_at) {
      await auth.upsertProfile(user.id, { first_login_at: new Date().toISOString() });
      await auth.sendEmail('welcome', email, { name: email.split('@')[0] });
    }
  }

  window.location.href = 'index.html';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function showToast(msg, success = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (success ? ' success' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}
</script>
</body>
</html>
