<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4FORE LEAGUE · Live Scorecard</title>
<link rel="stylesheet" href="assets/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-body);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* NAV — dark green, fixed, holds round code + End Round */
  nav {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 200;
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--color-green);
    border-bottom: 2px solid var(--color-gold);
  }

  .nav-logo {
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: #ffffff;
    letter-spacing: 0.05em;
    text-decoration: none;
  }

  .nav-logo span { color: var(--color-gold); }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .nav-round-label {
    font-family: var(--font-display);
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }

  .btn-end-round {
    font-family: var(--font-display);
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(192,57,43,0.75);
    background: transparent;
    border: 1px solid rgba(192,57,43,0.3);
    padding: 7px 16px;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
  }

  .btn-end-round:hover { color: var(--color-error); border-color: rgba(192,57,43,0.7); background: rgba(192,57,43,0.08); }

  /* LEADERBOARD */
  .leaderboard {
    position: sticky;
    top: 53px;
    z-index: 90;
    background: var(--color-bg-cream);
    border-bottom: 1px solid var(--color-border);
    padding: 10px 24px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
  }

  .leaderboard::-webkit-scrollbar { height: 3px; }
  .leaderboard::-webkit-scrollbar-thumb { background: var(--color-gold); border-radius: 2px; }

  .lb-card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    min-width: 110px;
    flex-shrink: 0;
    transition: border-color 0.2s;
  }

  .lb-card.rank-1 { border-color: var(--color-gold); background: rgba(201,168,76,0.06); }
  .lb-card.rank-2 { border-color: #C0C0C0; }
  .lb-card.rank-3 { border-color: var(--color-green); }

  .lb-rank {
    font-family: var(--font-display);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--color-muted);
    line-height: 1;
    margin-bottom: 3px;
  }

  .lb-card.rank-1 .lb-rank { color: var(--color-gold); }
  .lb-card.rank-2 .lb-rank { color: #A0A0A0; }
  .lb-card.rank-3 .lb-rank { color: var(--color-green); }

  .lb-name {
    font-family: var(--font-display);
    font-size: 0.85rem;
    color: var(--color-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
  }

  .lb-score {
    font-family: var(--font-display);
    font-size: 1.2rem;
    color: var(--color-gold);
    line-height: 1;
    margin-top: 2px;
  }

  .lb-card.rank-1 .lb-score { font-size: 1.35rem; }

  /* MAIN CONTENT */
  .page {
    padding-top: 130px;
    padding-bottom: 80px;
    max-width: 720px;
    margin: 0 auto;
    padding-left: 24px;
    padding-right: 24px;
  }

  /* HOLE NAVIGATION */
  .hole-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 16px;
  }

  .hole-nav-label {
    font-family: var(--font-display);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--color-muted);
    white-space: nowrap;
  }

  .btn-nav {
    font-family: var(--font-display);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--color-green);
    background: var(--color-bg);
    border: 1.5px solid var(--color-border);
    padding: 10px 24px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .btn-nav:hover:not(:disabled) { background: var(--color-green-tint); border-color: var(--color-green); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

  /* HOLE PANEL */
  .hole-panel {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .hole-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    background: var(--color-bg-cream);
    border-bottom: 1px solid var(--color-border);
    flex-wrap: wrap;
    gap: 12px;
  }

  .hole-number {
    font-family: var(--font-display);
    font-size: 2rem;
    color: var(--color-green);
    line-height: 1;
  }

  .par-label {
    font-family: var(--font-display);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--color-muted);
    margin-bottom: 6px;
  }

  .par-selector { display: flex; gap: 2px; }

  .par-btn {
    font-family: var(--font-display);
    font-size: 1rem;
    color: var(--color-muted);
    background: var(--color-bg);
    border: 1.5px solid var(--color-border);
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.12s;
  }

  .par-btn:hover { color: var(--color-text); border-color: var(--color-gold); }
  .par-btn.active { background: var(--color-gold); color: var(--color-green); border-color: var(--color-gold); }

  /* PLAYER ROWS */
  .player-scoring-row {
    padding: 20px 24px;
    border-bottom: 1px solid var(--color-border);
  }

  .player-scoring-row:last-child { border-bottom: none; }

  .player-row-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
  }

  .player-label {
    font-family: var(--font-display);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--color-green);
  }

  .player-mult-label {
    font-family: var(--font-display);
    font-size: 0.65rem;
    color: var(--color-muted);
    margin-left: 8px;
  }

  .player-hole-score {
    font-family: var(--font-display);
    font-size: 1.5rem;
    color: var(--color-border);
    line-height: 1;
    transition: color 0.2s;
  }

  .player-hole-score.has-score { color: var(--color-gold); }

  .inputs-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .input-group { display: flex; flex-direction: column; gap: 5px; }

  .input-label {
    font-family: var(--font-display);
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--color-muted);
  }

  .strokes-input {
    background: var(--color-bg-cream);
    border: 1.5px solid var(--color-border);
    color: var(--color-text);
    font-family: var(--font-display);
    font-size: 1.6rem;
    padding: 10px 14px;
    width: 80px;
    outline: none;
    text-align: center;
    border-radius: var(--radius-sm);
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }

  .strokes-input::-webkit-outer-spin-button,
  .strokes-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .strokes-input:focus { border-color: var(--color-green); background: var(--color-bg); }

  .declaration-select {
    background: var(--color-bg-cream);
    border: 1.5px solid var(--color-border);
    color: var(--color-text);
    font-family: var(--font-display);
    font-size: 0.9rem;
    padding: 10px 12px;
    outline: none;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: border-color 0.15s;
    min-width: 180px;
  }

  .declaration-select:focus { border-color: var(--color-green); background: var(--color-bg); }

  /* HIT / MISS TOGGLE */
  .hit-miss-wrap { display: flex; gap: 2px; }

  .hit-btn, .miss-btn {
    font-family: var(--font-display);
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 16px;
    border: 1.5px solid var(--color-border);
    background: var(--color-bg);
    color: var(--color-muted);
    cursor: pointer;
    transition: all 0.12s;
  }

  .hit-btn:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
  .miss-btn:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }

  .hit-btn:hover  { background: var(--color-green-tint); color: var(--color-green); border-color: var(--color-green); }
  .miss-btn:hover { background: rgba(192,57,43,0.07); color: var(--color-error); border-color: rgba(192,57,43,0.4); }

  .hit-btn.active  { background: var(--color-green); color: #ffffff; border-color: var(--color-green); }
  .miss-btn.active { background: var(--color-error); color: #ffffff; border-color: var(--color-error); }

  /* MOMENT BUTTONS */
  .moments-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .moment-btn {
    font-family: var(--font-display);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1.5px solid var(--color-border);
    color: var(--color-muted);
    background: var(--color-bg);
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
  }

  .moment-btn:hover { border-color: var(--color-green); color: var(--color-green); background: var(--color-green-tint); }
  .moment-btn.active { background: var(--color-green-tint); border-color: var(--color-green); color: var(--color-green); }

  .moment-btn[data-moment="hio"] { border-color: rgba(201,168,76,0.4); color: var(--color-muted); }
  .moment-btn[data-moment="hio"]:hover { border-color: var(--color-gold); color: var(--color-gold); background: rgba(201,168,76,0.08); }
  .moment-btn[data-moment="hio"].active { border-color: var(--color-gold); color: var(--color-gold); background: rgba(201,168,76,0.12); }

  /* HOLE PROGRESS BAR */
  .hole-progress {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
  }

  .hole-pip {
    flex: 1;
    height: 4px;
    background: var(--color-border);
    border-radius: 2px;
    transition: background 0.2s;
    cursor: pointer;
  }

  .hole-pip.current { background: var(--color-gold); }
  .hole-pip.scored  { background: var(--color-green); }

  /* NO PLAYERS STATE */
  .no-players { text-align: center; padding: 80px 24px; }

  .no-players h2 {
    font-family: var(--font-display);
    font-size: 2rem;
    color: var(--color-green);
    margin-bottom: 16px;
  }

  .no-players p { color: var(--color-muted); margin-bottom: 32px; }

  .btn-primary {
    background: var(--color-gold);
    color: var(--color-green);
    font-family: var(--font-display);
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 16px 40px;
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background 0.15s;
  }

  .btn-primary:hover { background: var(--color-gold-hover); }

  /* VIEW TOGGLE */
  .view-toggle { display: flex; gap: 2px; margin-bottom: 20px; }

  .toggle-btn {
    font-family: var(--font-display);
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 9px 20px;
    border: 1.5px solid var(--color-border);
    background: var(--color-bg);
    color: var(--color-muted);
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.12s;
  }

  .toggle-btn.active { background: var(--color-green); border-color: var(--color-green); color: #ffffff; }
  .toggle-btn:hover:not(.active) { color: var(--color-text); border-color: var(--color-gold); }

  /* FULL SCORECARD TABLE */
  .full-scorecard-wrap { display: none; overflow-x: auto; }
  .full-scorecard-wrap.visible { display: block; }

  .full-scorecard-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 560px;
    font-family: var(--font-display);
  }

  .full-scorecard-table thead th {
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--color-green);
    padding: 10px 12px;
    background: var(--color-bg-cream);
    border-bottom: 2px solid var(--color-border);
    white-space: nowrap;
    text-align: left;
  }

  .full-scorecard-table thead th.player-col {
    border-left: 1px solid var(--color-border);
    text-align: center;
  }

  .full-scorecard-table tbody tr { cursor: pointer; transition: background 0.12s; }
  .full-scorecard-table tbody tr:hover td { background: var(--color-green-tint); }

  .full-scorecard-table tbody tr.hole-current td {
    background: rgba(201,168,76,0.07);
    border-top: 1px solid rgba(201,168,76,0.3);
    border-bottom: 1px solid rgba(201,168,76,0.3);
  }

  .full-scorecard-table tbody tr.hole-unplayed td { opacity: 0.4; }

  .full-scorecard-table td {
    padding: 9px 12px;
    font-size: 0.88rem;
    color: var(--color-text);
    border-bottom: 1px solid var(--color-border);
    vertical-align: middle;
    white-space: nowrap;
  }

  .full-scorecard-table td.player-col {
    border-left: 1px solid var(--color-border);
    text-align: center;
  }

  .sc-hole-num { font-size: 1rem; color: var(--color-gold); }
  .sc-par { color: var(--color-muted); font-size: 0.8rem; }
  .sc-pts { font-size: 1rem; color: var(--color-gold); }
  .sc-score-detail { font-size: 0.72rem; color: var(--color-muted); line-height: 1.3; }
  .sc-hit  { color: var(--color-success); font-weight: 700; }
  .sc-miss { color: var(--color-error); font-weight: 700; }
  .sc-moments { font-size: 0.7rem; color: var(--color-gold); }

  /* TOTALS ROW */
  .full-scorecard-table tfoot tr td {
    background: var(--color-bg-cream);
    border-top: 2px solid var(--color-border);
    font-weight: 700;
  }

  .tfoot-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--color-muted);
    display: block;
    margin-bottom: 2px;
  }

  .tfoot-val { font-size: 1rem; color: var(--color-gold); display: block; }
  .tfoot-total { font-size: 1.4rem; color: var(--color-gold); }
  .tfoot-breakdown { font-size: 0.7rem; color: var(--color-muted); line-height: 1.6; margin-top: 3px; }

  /* ROUND CODE BADGE */
  .round-code-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 12px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.08);
  }

  .round-code-label {
    font-family: var(--font-display);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    white-space: nowrap;
  }

  .round-code-value {
    font-family: var(--font-display);
    font-size: 1.1rem;
    color: var(--color-gold);
    letter-spacing: 0.15em;
  }

  /* LOADING OVERLAY */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--color-bg);
    z-index: 9998;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.4s;
  }

  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--color-border);
    border-top-color: var(--color-gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--font-display);
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--color-muted);
  }

  /* LOCKED STATE */
  body.round-locked .strokes-input,
  body.round-locked .declaration-select,
  body.round-locked .hit-btn,
  body.round-locked .miss-btn,
  body.round-locked .moment-btn,
  body.round-locked .par-btn {
    pointer-events: none;
    opacity: 0.45;
  }

  body.round-locked .btn-end-round { display: none; }

  .locked-banner {
    display: none;
    background: rgba(201,168,76,0.1);
    border-bottom: 1px solid var(--color-border);
    padding: 10px 24px;
    text-align: center;
    font-family: var(--font-display);
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--color-gold);
  }

  body.round-locked .locked-banner { display: block; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    nav { padding: 12px 16px; }
    .page { padding-left: 16px; padding-right: 16px; }
    .leaderboard { padding: 8px 16px; }
    .hole-header { padding: 14px 16px; }
    .player-scoring-row { padding: 16px; }
    .inputs-row { gap: 6px; }
    .strokes-input { width: 68px; font-size: 1.3rem; }
    .declaration-select { min-width: 0; flex: 1; }
    .btn-nav { padding: 10px 16px; }
  }
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <p class="loading-text" id="loadingText">Loading round…</p>
</div>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">4<span>FORE</span></a>
  <div class="nav-right">
    <div class="round-code-badge" id="roundCodeBadge" style="display:none">
      <span class="round-code-label">Code</span>
      <span class="round-code-value" id="roundCodeValue">—</span>
    </div>
    <span class="nav-round-label" id="navRoundLabel">Live Round</span>
    <button class="btn-end-round" id="endRoundBtn" onclick="endRound()">End Round</button>
    <a href="login.html" id="nav-auth-link" style="font-family:'Bebas Neue',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);text-decoration:none;opacity:0.9;">Sign In</a>
  </div>
</nav>
<script>
  (async () => {
    const session = await auth.getSession();
    const link = document.getElementById('nav-auth-link');
    if (session) { link.href = 'account.html'; link.textContent = 'Account'; }
  })();
</script>

<!-- LOCKED BANNER -->
<div class="locked-banner">Round Completed — Scores are locked</div>

<!-- LEADERBOARD -->
<div class="leaderboard" id="leaderboard"></div>

<!-- PAGE -->
<div class="page" id="mainPage">
  <!-- VIEW TOGGLE -->
  <div class="view-toggle">
    <button class="toggle-btn active" id="toggleHole" onclick="setView('hole')">Current Hole</button>
    <button class="toggle-btn" id="toggleFull" onclick="setView('full')">Full Scorecard</button>
  </div>

  <!-- SINGLE HOLE VIEW -->
  <div id="holeViewWrap">
    <!-- HOLE PROGRESS PIPS -->
    <div class="hole-progress" id="holePips"></div>

    <!-- HOLE NAVIGATION -->
    <div class="hole-nav">
      <button class="btn-nav" id="prevBtn" disabled>← Prev</button>
      <span class="hole-nav-label" id="holeNavLabel">Hole 1 of 18</span>
      <button class="btn-nav" id="nextBtn">Next →</button>
    </div>

    <!-- HOLE PANEL (rebuilt per hole) -->
    <div class="hole-panel" id="holeView"></div>
  </div>

  <!-- FULL SCORECARD VIEW -->
  <div class="full-scorecard-wrap" id="fullScorecardWrap"></div>
</div>

<script>
  // ── Supabase state ────────────────────────────────────────────────
  const urlParams   = new URLSearchParams(window.location.search);
  let roundId       = urlParams.get('round');
  let roundLocked   = false;
  let declLimits    = {};       // { dtg: 2, gfg2: 2, ... } from rounds.decl_limits
  let commissionerUserId = null;
  let broadcastCh   = null;

  // Legacy URL param support
  const legacyCount = parseInt(urlParams.get('p')) || 0;

  // ── App state ─────────────────────────────────────────────────────
  const players  = [];
  let currentHole = 0;
  let currentView = 'hole';
  let holeData    = [];
  let myPlayerIndex = -1;  // -1 = watch only, 0+ = identified player
  let isCommissioner = false;

  // Declaration usage map: usageMap[playerIdx][declType] = count
  let usageMap = {};

  // Track pending vote prompts: { playerIndex, holeNumber, declaration, playerName }
  let pendingVote = null;

  function buildHoleData() {
    return Array.from({ length: 18 }, () => ({
      par: 4,
      players: players.map(() => ({
        strokes:     null,
        declaration: 'none',
        called_score: null,
        hit:         null,
        awaitingVote: false,
        moments: { hio: false, sand: false, chip: false, pap: false }
      }))
    }));
  }

  // ── Scoring logic (unchanged) ─────────────────────────────────────
  function basePoints(strokes, par) {
    const diff = strokes - par;
    if (diff <= -3) return 10;
    if (diff === -2) return 6;
    if (diff === -1) return 4;
    if (diff === 0)  return 2;
    if (diff === 1)  return 1;
    return 0;
  }

  // CYS called score → stroke diff mapping
  const CYS_DIFF = { albatross: -3, eagle: -2, birdie: -1, par: 0, bogey: 1, double: 2 };

  function resolveCysHit(pd, h) {
    if (!pd.called_score || pd.strokes === null) return null;
    return (pd.strokes - h.par) === CYS_DIFF[pd.called_score];
  }

  function holeScore(holeIdx, playerIdx) {
    const h  = holeData[holeIdx];
    const pd = h.players[playerIdx];
    const p  = players[playerIdx];
    if (pd.strokes === null) return null;
    let pts = basePoints(pd.strokes, h.par);
    if (pd.declaration !== 'none') {
      // CYS: auto-determine hit from score comparison; group vote can override via pd.hit
      const effectiveHit = (pd.declaration === 'cys' && pd.called_score && pd.hit === null)
        ? resolveCysHit(pd, h)
        : pd.hit;
      if (effectiveHit === true)  pts = pts * p.mult;
      else if (effectiveHit === false) pts = pts + 0.5;
    }
    if (pd.moments.hio)  pts += 44;
    if (pd.moments.sand) pts += 3;
    if (pd.moments.chip) pts += 2;
    if (pd.moments.pap)  pts += 2;
    return Math.round(pts * 10) / 10;
  }

  function totalScore(playerIdx) {
    let total = players[playerIdx].hs;
    for (let h = 0; h < 18; h++) {
      const s = holeScore(h, playerIdx);
      if (s !== null) total += s;
    }
    return Math.round(total * 10) / 10;
  }

  function holeHasAnyScore(holeIdx) {
    return holeData[holeIdx].players.some(pd => pd.strokes !== null);
  }

  // ── Declarations available per par ────────────────────────────────
  const ALL_DECLARATIONS = [
    { value: 'none',     label: 'No Declaration' },
    { value: 'dtg',      label: 'Drive the Green' },
    { value: 'gfg2',     label: 'Go for Green in 2' },
    { value: 'shortcut', label: 'Short Cut' },
    { value: '1putt',    label: '1-Putt Par' },
    { value: 'cys',      label: 'Call Your Score' },
  ];

  const DEFAULT_DECL_LIMIT = 2;

  function getDeclLimit(declValue) {
    return (declLimits && declLimits[declValue] != null)
      ? declLimits[declValue]
      : DEFAULT_DECL_LIMIT;
  }

  function isOverLimit(playerIdx, declValue) {
    if (declValue === 'none') return false;
    const used = usageMap[playerIdx]?.[declValue] || 0;
    return used >= getDeclLimit(declValue);
  }

  function declarationsForPar(par, playerIdx) {
    return ALL_DECLARATIONS.filter(d => {
      if (d.value === 'dtg')  return par === 4;
      if (d.value === 'gfg2') return par === 5;
      return true;
    }).map(d => ({
      ...d,
      overLimit: d.value !== 'none' && isOverLimit(playerIdx, d.value),
    }));
  }

  // ── Edit permissions ──────────────────────────────────────────────
  function canEdit(pi) {
    if (isCommissioner) return true;
    return pi === myPlayerIndex;
  }

  // ── Render leaderboard ────────────────────────────────────────────
  function renderLeaderboard() {
    const lb = document.getElementById('leaderboard');
    if (players.length === 0) { lb.innerHTML = ''; return; }
    const scores = players.map((p, i) => ({ name: p.name, total: totalScore(i), idx: i }))
      .sort((a, b) => b.total - a.total);
    let rank = 1;
    scores.forEach((s, i) => {
      if (i > 0 && s.total < scores[i - 1].total) rank = i + 1;
      s.rank = rank;
    });
    const rankLabels = ['1ST', '2ND', '3RD', '4TH', '5TH', '6TH'];
    lb.innerHTML = scores.map(s => `
      <div class="lb-card rank-${Math.min(s.rank, 4)}">
        <div class="lb-rank">${rankLabels[s.rank - 1] || s.rank + 'TH'}</div>
        <div class="lb-name">${escHtml(s.name)}</div>
        <div class="lb-score">${s.total}</div>
      </div>
    `).join('');
  }

  // ── Render hole progress pips ─────────────────────────────────────
  function renderPips() {
    const container = document.getElementById('holePips');
    container.innerHTML = Array.from({ length: 18 }, (_, i) => {
      let cls = 'hole-pip';
      if (i === currentHole) cls += ' current';
      else if (holeHasAnyScore(i)) cls += ' scored';
      return `<div class="${cls}" onclick="goHole(${i})" title="Hole ${i + 1}"></div>`;
    }).join('');
  }

  // ── Render hole view ──────────────────────────────────────────────
  function renderHole(holeIdx) {
    const h = holeData[holeIdx];
    const holeView = document.getElementById('holeView');
    const parBtns = [3, 4, 5].map(p =>
      `<button class="par-btn${h.par === p ? ' active' : ''}" data-par="${p}">${p}</button>`
    ).join('');
    const playerRows = players.map((player, pi) => {
      const pd    = h.players[pi];
      const decls = declarationsForPar(h.par, pi);
      const notMine = !canEdit(pi);

      const declOptions = decls.map(d => {
        const limitNote = d.overLimit ? ` (limit reached)` : '';
        return `<option value="${d.value}"${pd.declaration === d.value ? ' selected' : ''}${d.overLimit ? ' disabled' : ''}>${d.label}${limitNote}</option>`;
      }).join('');

      const isCys = pd.declaration === 'cys';
      const declNotNone = pd.declaration !== 'none';

      // CYS second dropdown
      const cysOptions = ['albatross','eagle','birdie','par','bogey','double'].map(v =>
        `<option value="${v}"${pd.called_score === v ? ' selected' : ''}>${v.charAt(0).toUpperCase()+v.slice(1)}${v==='double'?' Bogey+':''}</option>`
      ).join('');
      const cysDropdown = isCys ? `
        <div class="input-group">
          <span class="input-label">Called Score</span>
          <select class="cys-select" data-player="${pi}" data-hole="${holeIdx}">
            <option value="">Select…</option>
            ${cysOptions}
          </select>
        </div>` : '';

      // Awaiting group vote banner (replaces hit/miss for non-CYS)
      const awaitingBanner = pd.awaitingVote
        ? `<div class="awaiting-vote-banner">⏳ Waiting for group confirmation…</div>`
        : '';

      // Hit/miss: hidden for CYS (auto-determined) or when awaiting vote
      const showHitMiss = declNotNone && !isCys && !pd.awaitingVote;
      const hitMissHidden = showHitMiss ? '' : 'style="display:none"';
      const hitActive  = pd.hit === true  ? ' active' : '';
      const missActive = pd.hit === false ? ' active' : '';

      const momentBtns = [
        { key: 'hio',  label: '⛳ Hole in One +44' },
        { key: 'sand', label: '🏖 Sand Save +3' },
        { key: 'chip', label: '⛳ Chip-In +2' },
        { key: 'pap',  label: '⚠ Par After Penalty +2' },
      ].map(m =>
        `<button class="moment-btn${pd.moments[m.key] ? ' active' : ''}" data-player="${pi}" data-moment="${m.key}">${m.label}</button>`
      ).join('');

      const score = holeScore(holeIdx, pi);
      const scoreDisplay = score !== null ? score + ' pts' : '—';
      const scoreClass = score !== null ? ' has-score' : '';
      const multLabel = player.mult === 1 ? 'Scratch' : player.mult + '×';
      const notMineClass = notMine ? ' not-mine' : '';

      return `
        <div class="player-scoring-row${notMineClass}" data-player-row="${pi}">
          <div class="player-row-header">
            <div>
              <span class="player-label">${escHtml(player.name)}</span>
              <span class="player-mult-label">${multLabel}</span>
            </div>
            <span class="player-hole-score${scoreClass}" id="hole-score-${holeIdx}-${pi}">${scoreDisplay}</span>
          </div>
          <div class="inputs-row">
            <div class="input-group">
              <span class="input-label">Strokes</span>
              <input class="strokes-input" type="number" min="1" max="15" placeholder="—"
                value="${pd.strokes !== null ? pd.strokes : ''}" data-player="${pi}" data-hole="${holeIdx}"/>
            </div>
            <div class="input-group">
              <span class="input-label">Declaration</span>
              <select class="declaration-select" data-player="${pi}" data-hole="${holeIdx}">${declOptions}</select>
            </div>
            ${cysDropdown}
            ${awaitingBanner}
            <div class="input-group hit-miss-wrap" data-hm-player="${pi}" ${hitMissHidden}>
              <span class="input-label">Hit?</span>
              <div style="display:flex;gap:2px;">
                <button class="hit-btn${hitActive}"  data-player="${pi}" data-hm="hit">HIT</button>
                <button class="miss-btn${missActive}" data-player="${pi}" data-hm="miss">MISS</button>
              </div>
            </div>
          </div>
          <div class="moments-row">${momentBtns}</div>
        </div>
      `;
    }).join('');
    holeView.innerHTML = `
      <div class="hole-header">
        <span class="hole-number">HOLE ${holeIdx + 1}</span>
        <div>
          <div class="par-label">Par</div>
          <div class="par-selector">${parBtns}</div>
        </div>
      </div>
      ${playerRows}
    `;
    document.getElementById('holeNavLabel').textContent = `Hole ${holeIdx + 1} of 18`;
    document.getElementById('prevBtn').disabled = holeIdx === 0;
    document.getElementById('nextBtn').disabled = holeIdx === 17;
    renderPips();
  }

  // ── View toggle ───────────────────────────────────────────────────
  function setView(view) {
    currentView = view;
    document.getElementById('toggleHole').classList.toggle('active', view === 'hole');
    document.getElementById('toggleFull').classList.toggle('active', view === 'full');
    document.getElementById('holeViewWrap').style.display = view === 'hole' ? '' : 'none';
    const wrap = document.getElementById('fullScorecardWrap');
    if (view === 'full') {
      wrap.classList.add('visible');
      renderFullScorecard();
    } else {
      wrap.classList.remove('visible');
    }
  }

  // ── Full scorecard render ─────────────────────────────────────────
  const DECL_LABELS = {
    none: '', dtg: 'Drive Green', gfg2: 'Grn in 2',
    shortcut: 'Short Cut', '1putt': '1-Putt', cys: 'Call Score'
  };
  const MOMENT_LABELS = { hio: 'HiO+44', sand: 'Sand+3', chip: 'Chip+2', pap: 'PAP+2' };

  function renderFullScorecard() {
    const wrap = document.getElementById('fullScorecardWrap');
    const playerHeaders = players.map(p =>
      `<th class="player-col">${escHtml(p.name)}<br><span style="font-family:'Bebas Neue';font-weight:600;font-size:0.6rem;color:rgba(245,240,232,0.4);letter-spacing:0.05em;">${p.mult}×</span></th>`
    ).join('');
    const rows = Array.from({ length: 18 }, (_, hi) => {
      const h = holeData[hi];
      const played = holeHasAnyScore(hi);
      const isCurrent = hi === currentHole;
      let cls = isCurrent ? 'hole-current' : (!played ? 'hole-unplayed' : '');
      const playerCells = players.map((_, pi) => {
        const pd = h.players[pi];
        const score = holeScore(hi, pi);
        if (!played || pd.strokes === null) return `<td class="player-col">—</td>`;
        const diff = pd.strokes - h.par;
        const diffLabel = diff <= -3 ? 'Albatross' : diff === -2 ? 'Eagle' : diff === -1 ? 'Birdie'
          : diff === 0 ? 'Par' : diff === 1 ? 'Bogey' : 'Dbl+';
        let declLine = '';
        if (pd.declaration !== 'none') {
          const hitSpan = pd.hit === true ? `<span class="sc-hit">HIT</span>`
            : pd.hit === false ? `<span class="sc-miss">MISS</span>` : '<span style="opacity:.4">—</span>';
          declLine = `<div class="sc-score-detail">${DECL_LABELS[pd.declaration] || pd.declaration} · ${hitSpan}</div>`;
        }
        const momentKeys = Object.keys(pd.moments).filter(k => pd.moments[k]);
        const momentLine = momentKeys.length
          ? `<div class="sc-moments">${momentKeys.map(k => MOMENT_LABELS[k]).join(' ')}</div>` : '';
        return `
          <td class="player-col">
            <div class="sc-pts">${score !== null ? score : '—'}</div>
            <div class="sc-score-detail">${pd.strokes} strokes · ${diffLabel}</div>
            ${declLine}${momentLine}
          </td>`;
      }).join('');
      return `
        <tr class="${cls}" onclick="jumpToHole(${hi})">
          <td><span class="sc-hole-num">${hi + 1}</span></td>
          <td><span class="sc-par">Par ${h.par}</span></td>
          ${playerCells}
        </tr>`;
    }).join('');
    const footerCells = players.map((p, pi) => {
      let basePts = 0, multPts = 0, momentPts = 0;
      for (let hi = 0; hi < 18; hi++) {
        const h = holeData[hi];
        const pd = h.players[pi];
        if (pd.strokes === null) continue;
        const base = basePoints(pd.strokes, h.par);
        const mPts = (pd.moments.hio ? 44 : 0) + (pd.moments.sand ? 3 : 0)
                   + (pd.moments.chip ? 2 : 0) + (pd.moments.pap ? 2 : 0);
        if (pd.declaration !== 'none' && pd.hit === true) {
          basePts += base;
          multPts += Math.round((base * p.mult - base) * 10) / 10;
        } else if (pd.declaration !== 'none' && pd.hit === false) {
          basePts += base + 0.5;
        } else {
          basePts += base;
        }
        momentPts += mPts;
      }
      basePts = Math.round(basePts * 10) / 10;
      multPts = Math.round(multPts * 10) / 10;
      momentPts = Math.round(momentPts * 10) / 10;
      return `
        <td class="player-col">
          <span class="tfoot-total">${totalScore(pi)}</span>
          <div class="tfoot-breakdown">
            Head start: +${p.hs}<br>
            Base: ${basePts} · Mult bonus: +${multPts}<br>
            Moments: +${momentPts}
          </div>
        </td>`;
    }).join('');
    wrap.innerHTML = `
      <table class="full-scorecard-table">
        <thead><tr><th>Hole</th><th>Par</th>${playerHeaders}</tr></thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr>
            <td colspan="2" style="font-family:'Bebas Neue';font-size:0.75rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);">Total</td>
            ${footerCells}
          </tr>
        </tfoot>
      </table>
    `;
  }

  function jumpToHole(idx) { setView('hole'); goHole(idx); }

  function goHole(idx) {
    if (idx < 0 || idx > 17) return;
    currentHole = idx;
    renderHole(currentHole);
    renderLeaderboard();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function updateHoleScoreDisplay(holeIdx, playerIdx) {
    const el = document.getElementById(`hole-score-${holeIdx}-${playerIdx}`);
    if (!el) return;
    const score = holeScore(holeIdx, playerIdx);
    if (score !== null) { el.textContent = score + ' pts'; el.classList.add('has-score'); }
    else { el.textContent = '—'; el.classList.remove('has-score'); }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Toast ─────────────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.toggle('error', isError);
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
  }

  // ── Save to Supabase ──────────────────────────────────────────────
  async function saveHoleScore(holeIdx, playerIdx, opts = {}) {
    if (!roundId || roundLocked) return;
    if (!canEdit(playerIdx)) return;
    const h  = holeData[holeIdx];
    const pd = h.players[playerIdx];

    // Track previous moment states for broadcast detection
    const prevMoments = opts.prevMoments || {};

    const row = {
      round_id:     roundId,
      player_index: playerIdx,
      hole_number:  holeIdx,
      par:          h.par,
      strokes:      pd.strokes,
      declaration:  pd.declaration,
      called_score: pd.called_score,
      hit:          pd.hit,
      moments_hio:  pd.moments.hio,
      moments_sand: pd.moments.sand,
      moments_chip: pd.moments.chip,
      moments_pap:  pd.moments.pap,
    };
    const { error } = await window.sb
      .from('hole_scores')
      .upsert(row, { onConflict: 'round_id,player_index,hole_number' });
    if (error) {
      console.warn('saveHoleScore failed:', error.message);
      if (error.message?.includes('Declaration limit')) {
        showToast('Declaration limit reached — choose another', true);
      } else {
        showToast('Score not saved — check connection', true);
      }
      return;
    }

    // Broadcast moment bonuses that were just turned ON
    const momentDefs = [
      { key: 'hio',  label: 'got a Hole in One', pts: 44 },
      { key: 'sand', label: 'made a Sand Save',   pts: 3  },
      { key: 'chip', label: 'chipped in',          pts: 2  },
      { key: 'pap',  label: 'made Par After Penalty', pts: 2 },
    ];
    momentDefs.forEach(m => {
      if (pd.moments[m.key] && !prevMoments[m.key] && broadcastCh) {
        broadcastCh.send({
          type: 'broadcast', event: 'moment',
          payload: { playerName: players[playerIdx].name, moment: m.key, label: m.label, holeNumber: holeIdx + 1, points: m.pts },
        });
      }
    });
  }

  // ── Broadcast a declaration for group voting ──────────────────────
  function broadcastDeclaration(playerIdx, holeIdx) {
    if (!broadcastCh || myPlayerIndex !== playerIdx) return;
    const pd = holeData[holeIdx].players[playerIdx];
    if (pd.declaration === 'none') return;

    // For Short Cut: pre-shot confirmation needed before saving
    const isShortcut = pd.declaration === 'shortcut';
    broadcastCh.send({
      type: 'broadcast', event: 'declaration',
      payload: {
        playerIndex:   playerIdx,
        playerName:    players[playerIdx].name,
        declaration:   pd.declaration,
        calledScore:   pd.called_score,
        holeNumber:    holeIdx + 1,
        isPreShot:     isShortcut,
        roundId,
      },
    });
    holeData[holeIdx].players[playerIdx].awaitingVote = true;
    renderHole(holeIdx);
  }

  // ── Apply a realtime score update ─────────────────────────────────
  function applyRemoteScore(record) {
    const hi = record.hole_number;
    const pi = record.player_index;
    if (!holeData.length || pi >= players.length) return;
    const h  = holeData[hi];
    const pd = h.players[pi];
    h.par            = record.par;
    pd.strokes       = record.strokes;
    pd.declaration   = record.declaration || 'none';
    pd.called_score  = record.called_score || null;
    pd.hit           = record.hit;
    pd.moments.hio   = record.moments_hio;
    pd.moments.sand  = record.moments_sand;
    pd.moments.chip  = record.moments_chip;
    pd.moments.pap   = record.moments_pap;
    // If hit was resolved (vote came in), clear awaiting state
    if (record.hit !== null && pd.awaitingVote) pd.awaitingVote = false;
    if (hi === currentHole) renderHole(currentHole);
    renderLeaderboard();
    renderPips();
    if (currentView === 'full') renderFullScorecard();
  }

  // ── Realtime subscription ─────────────────────────────────────────
  function subscribeRealtime() {
    if (!roundId) return;

    // hole_scores changes
    window.sb
      .channel('hole_scores:' + roundId)
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'hole_scores',
        filter: 'round_id=eq.' + roundId,
      }, payload => {
        if (payload.new && payload.new.round_id === roundId) {
          applyRemoteScore(payload.new);
        }
      })
      .subscribe();

    // declaration_votes changes — resolve votes as they come in
    window.sb
      .channel('decl_votes:' + roundId)
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'declaration_votes',
        filter: 'round_id=eq.' + roundId,
      }, payload => {
        if (payload.new) checkVoteResolution(payload.new.player_index, payload.new.hole_number);
      })
      .subscribe();

    // declaration_usage changes — keep usage map live
    window.sb
      .channel('decl_usage:' + roundId)
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'declaration_usage',
        filter: 'round_id=eq.' + roundId,
      }, payload => {
        if (payload.new) {
          const { player_index, declaration_type, count } = payload.new;
          if (!usageMap[player_index]) usageMap[player_index] = {};
          usageMap[player_index][declaration_type] = count;
          if (currentHole !== undefined) renderHole(currentHole);
        }
      })
      .subscribe();

    // Broadcast channel for declaration prompts and moment notifications
    broadcastCh = window.sb.channel('broadcast:' + roundId);
    broadcastCh
      .on('broadcast', { event: 'declaration' }, ({ payload }) => {
        if (payload.playerIndex !== myPlayerIndex) {
          pendingVote = payload;
          showVotePrompt(payload);
        }
      })
      .on('broadcast', { event: 'moment' }, ({ payload }) => {
        handleMomentBroadcast(payload);
      })
      .subscribe();
  }

  // ── Vote resolution ───────────────────────────────────────────────
  async function checkVoteResolution(playerIndex, holeNumber) {
    const { data: votes } = await window.sb
      .from('declaration_votes')
      .select('vote')
      .eq('round_id', roundId)
      .eq('player_index', playerIndex)
      .eq('hole_number', holeNumber);
    if (!votes || votes.length === 0) return;
    const totalVoters = players.length - 1;
    const yesVotes = votes.filter(v => v.vote).length;
    if (votes.length >= totalVoters || yesVotes > totalVoters / 2 || (votes.length - yesVotes) > totalVoters / 2) {
      const hit = yesVotes > votes.length / 2;
      await window.sb.from('hole_scores').upsert({
        round_id: roundId, player_index: playerIndex, hole_number: holeNumber, hit,
        par: holeData[holeNumber].par,
      }, { onConflict: 'round_id,player_index,hole_number' });
      // Clear vote prompt if it was for this player/hole
      if (pendingVote?.playerIndex === playerIndex && pendingVote?.holeNumber === holeNumber + 1) {
        hideVotePrompt();
      }
    }
  }

  // ── Vote prompt UI ────────────────────────────────────────────────
  function showVotePrompt(payload) {
    const el = document.getElementById('votePrompt');
    const declLabel = ALL_DECLARATIONS.find(d => d.value === payload.declaration)?.label || payload.declaration;
    const extra = payload.calledScore ? ` (${payload.calledScore})` : '';
    const preShot = payload.isPreShot ? ' — confirm the line before the shot' : '';
    document.getElementById('voteText').textContent =
      `${payload.playerName} declared ${declLabel}${extra} on Hole ${payload.holeNumber}${preShot}. Did they hit it?`;
    document.getElementById('votePiPlayerIndex').value = payload.playerIndex;
    document.getElementById('votePiHoleNumber').value  = payload.holeNumber - 1;
    el.style.display = 'flex';
  }

  function hideVotePrompt() {
    document.getElementById('votePrompt').style.display = 'none';
    pendingVote = null;
  }

  async function castVote(voteYes) {
    if (myPlayerIndex < 0) { hideVotePrompt(); return; }
    const playerIndex = parseInt(document.getElementById('votePiPlayerIndex').value);
    const holeNumber  = parseInt(document.getElementById('votePiHoleNumber').value);
    await window.sb.from('declaration_votes').insert({
      round_id: roundId,
      player_index: playerIndex,
      hole_number: holeNumber,
      voter_player_index: myPlayerIndex,
      vote: voteYes,
    });
    hideVotePrompt();
  }

  // ── Moment broadcast handler ──────────────────────────────────────
  function handleMomentBroadcast(payload) {
    if (payload.moment === 'hio') {
      document.getElementById('hioName').textContent = payload.playerName + ' — Hole ' + payload.holeNumber;
      document.getElementById('hioOverlay').style.display = 'flex';
      clearTimeout(window._hioTimer);
      window._hioTimer = setTimeout(() => {
        document.getElementById('hioOverlay').style.display = 'none';
      }, 8000);
    } else {
      showToast(`${payload.playerName} just ${payload.label} on Hole ${payload.holeNumber} — +${payload.points} pts!`);
    }
  }

  // ── End round ─────────────────────────────────────────────────────
  async function endRound() {
    if (!roundId) { window.location.href = 'round.html'; return; }
    if (!confirm('End this round and lock all scores?')) return;
    const { error } = await window.sb
      .from('rounds')
      .update({ status: 'completed' })
      .eq('id', roundId);
    if (error) { showToast('Could not end round — try again', true); return; }
    window.location.href = 'round.html';
  }

  // ── Event delegation on holeView ─────────────────────────────────
  document.getElementById('holeView').addEventListener('input', e => {
    if (!e.target.classList.contains('strokes-input')) return;
    const pi  = parseInt(e.target.dataset.player);
    if (!canEdit(pi)) return;
    const val = parseInt(e.target.value);
    holeData[currentHole].players[pi].strokes = isNaN(val) || val < 1 ? null : val;
    updateHoleScoreDisplay(currentHole, pi);
    renderLeaderboard();
    renderPips();
    if (currentView === 'full') renderFullScorecard();
    saveHoleScore(currentHole, pi);
  });

  document.getElementById('holeView').addEventListener('change', e => {
    const pi = parseInt(e.target.dataset.player);
    if (!canEdit(pi)) return;

    if (e.target.classList.contains('declaration-select')) {
      const val = e.target.value;
      const pd  = holeData[currentHole].players[pi];
      pd.declaration = val;
      if (val === 'none') { pd.hit = null; pd.called_score = null; pd.awaitingVote = false; }
      updateHoleScoreDisplay(currentHole, pi);
      renderLeaderboard();
      renderHole(currentHole);
      if (currentView === 'full') renderFullScorecard();
      // Save first, then broadcast for group confirmation
      saveHoleScore(currentHole, pi).then(() => {
        if (val !== 'none') broadcastDeclaration(pi, currentHole);
      });
      return;
    }

    if (e.target.classList.contains('cys-select')) {
      const val = e.target.value;
      holeData[currentHole].players[pi].called_score = val || null;
      updateHoleScoreDisplay(currentHole, pi);
      renderLeaderboard();
      if (currentView === 'full') renderFullScorecard();
      saveHoleScore(currentHole, pi);
      return;
    }
  });

  document.getElementById('holeView').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;

    if (btn.classList.contains('par-btn')) {
      if (!isCommissioner && myPlayerIndex >= 0) return; // only commissioner changes par
      const newPar = parseInt(btn.dataset.par);
      holeData[currentHole].par = newPar;
      const validDeclValues = declarationsForPar(newPar, 0).map(d => d.value);
      holeData[currentHole].players.forEach((pd, pi) => {
        if (!validDeclValues.includes(pd.declaration)) { pd.declaration = 'none'; pd.hit = null; pd.called_score = null; }
        saveHoleScore(currentHole, pi);
      });
      renderHole(currentHole);
      renderLeaderboard();
      if (currentView === 'full') renderFullScorecard();
      return;
    }

    if (btn.dataset.hm) {
      const pi    = parseInt(btn.dataset.player);
      if (!canEdit(pi)) return;
      const isHit = btn.dataset.hm === 'hit';
      const current = holeData[currentHole].players[pi].hit;
      if ((isHit && current === true) || (!isHit && current === false)) {
        holeData[currentHole].players[pi].hit = null;
        btn.classList.remove('active');
      } else {
        holeData[currentHole].players[pi].hit = isHit;
        const hmWrap = document.querySelector(`.hit-miss-wrap[data-hm-player="${pi}"]`);
        if (hmWrap) {
          hmWrap.querySelector('.hit-btn').classList.toggle('active', isHit);
          hmWrap.querySelector('.miss-btn').classList.toggle('active', !isHit);
        }
      }
      updateHoleScoreDisplay(currentHole, pi);
      renderLeaderboard();
      if (currentView === 'full') renderFullScorecard();
      saveHoleScore(currentHole, pi);
      return;
    }

    if (btn.classList.contains('moment-btn')) {
      const pi = parseInt(btn.dataset.player);
      if (!canEdit(pi)) return;
      const m  = btn.dataset.moment;
      const prevMoments = { ...holeData[currentHole].players[pi].moments };
      holeData[currentHole].players[pi].moments[m] = !holeData[currentHole].players[pi].moments[m];
      btn.classList.toggle('active');
      updateHoleScoreDisplay(currentHole, pi);
      renderLeaderboard();
      if (currentView === 'full') renderFullScorecard();
      saveHoleScore(currentHole, pi, { prevMoments });
      return;
    }
  });

  document.getElementById('prevBtn').addEventListener('click', () => goHole(currentHole - 1));
  document.getElementById('nextBtn').addEventListener('click', () => goHole(currentHole + 1));

  // ── Init ──────────────────────────────────────────────────────────
  async function initRound() {
    const overlay = document.getElementById('loadingOverlay');
    const loadTxt = document.getElementById('loadingText');

    // Require auth
    const session = await auth.requireAuth();
    const currentUserId = session.user.id;

    // Legacy URL params (no round= param)
    if (!roundId && legacyCount > 0) {
      for (let i = 0; i < legacyCount; i++) {
        players.push({
          name: urlParams.get('n' + i) || 'Player ' + (i + 1),
          mult: parseFloat(urlParams.get('m' + i)) || 1.5,
          hs:   parseInt(urlParams.get('hs' + i))  || 0,
        });
      }
      holeData = buildHoleData();
      myPlayerIndex = 0;
      isCommissioner = true;
      overlay.classList.add('hidden');
      document.getElementById('navRoundLabel').textContent = players.map(p => p.name.split(' ')[0]).join(' · ');
      renderHole(0);
      renderLeaderboard();
      return;
    }

    // No round ID at all
    if (!roundId) {
      overlay.classList.add('hidden');
      document.getElementById('mainPage').innerHTML = `
        <div class="no-players">
          <h2>No Round Found</h2>
          <p>Start a new round or join one with a code.</p>
          <a href="round.html" class="btn-primary">Set Up Round</a>
        </div>
      `;
      document.getElementById('leaderboard').innerHTML = '';
      return;
    }

    // Fetch from Supabase
    try {
      loadTxt.textContent = 'Loading round…';

      const { data: round, error: roundErr } = await window.sb
        .from('rounds')
        .select('id, status, code, locked, decl_limits, commissioner_user_id')
        .eq('id', roundId)
        .single();

      if (roundErr || !round) throw new Error('Round not found');

      document.getElementById('roundCodeBadge').style.display = 'flex';
      document.getElementById('roundCodeValue').textContent = round.code;

      commissionerUserId = round.commissioner_user_id;
      declLimits = round.decl_limits || {};

      if (round.status === 'completed' || round.locked) {
        roundLocked = true;
        document.body.classList.add('round-locked');
      }

      loadTxt.textContent = 'Loading players…';
      const { data: roundPlayers, error: playersErr } = await window.sb
        .from('round_players')
        .select('player_index, name, multiplier, head_start, user_id')
        .eq('round_id', roundId)
        .order('player_index');

      if (playersErr || !roundPlayers || !roundPlayers.length) throw new Error('Players not found');

      roundPlayers.forEach(rp => {
        players.push({ name: rp.name, mult: rp.multiplier, hs: rp.head_start });
      });

      holeData = buildHoleData();

      // Determine player identity
      const matchedPlayer = roundPlayers.find(rp => rp.user_id === currentUserId);
      if (matchedPlayer) {
        myPlayerIndex = matchedPlayer.player_index;
      }
      isCommissioner = (currentUserId === commissionerUserId) || myPlayerIndex === 0;
      if (isCommissioner && myPlayerIndex < 0) myPlayerIndex = 0;

      loadTxt.textContent = 'Loading scores…';
      const { data: scores } = await window.sb
        .from('hole_scores')
        .select('*')
        .eq('round_id', roundId);

      if (scores) {
        scores.forEach(row => {
          const h  = holeData[row.hole_number];
          const pd = h.players[row.player_index];
          h.par            = row.par;
          pd.strokes       = row.strokes;
          pd.declaration   = row.declaration || 'none';
          pd.called_score  = row.called_score || null;
          pd.hit           = row.hit;
          pd.moments.hio   = row.moments_hio;
          pd.moments.sand  = row.moments_sand;
          pd.moments.chip  = row.moments_chip;
          pd.moments.pap   = row.moments_pap;
        });
      }

      // Load declaration usage
      const { data: usageData } = await window.sb
        .from('declaration_usage')
        .select('player_index, declaration_type, count')
        .eq('round_id', roundId);
      (usageData || []).forEach(row => {
        if (!usageMap[row.player_index]) usageMap[row.player_index] = {};
        usageMap[row.player_index][row.declaration_type] = row.count;
      });

      // Check for any open votes on reload
      const { data: openVotes } = await window.sb
        .from('declaration_votes')
        .select('player_index, hole_number')
        .eq('round_id', roundId);
      // (votes exist but round may already have resolved — handled by subscribeRealtime)

      overlay.classList.add('hidden');
      document.getElementById('navRoundLabel').textContent = players.map(p => p.name.split(' ')[0]).join(' · ');

      // Show commissioner settings link if commissioner
      if (isCommissioner) {
        const settingsLink = document.createElement('a');
        settingsLink.href = `commissioner.html?round=${roundId}`;
        settingsLink.textContent = 'Settings';
        settingsLink.style.cssText = 'font-family:"Bebas Neue",sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);text-decoration:none;opacity:0.9;margin-right:8px;';
        document.getElementById('endRoundBtn').before(settingsLink);
      }

      renderHole(0);
      renderLeaderboard();
      subscribeRealtime();

      // Show identity modal if not yet identified and round not locked
      if (myPlayerIndex < 0 && !roundLocked) {
        showIdentityModal(roundPlayers, currentUserId);
      }

    } catch (err) {
      console.error('initRound error:', err);
      overlay.classList.add('hidden');
      document.getElementById('mainPage').innerHTML = `
        <div class="no-players">
          <h2>Could Not Load Round</h2>
          <p>${escHtml(err.message || 'Unknown error')}</p>
          <a href="round.html" class="btn-primary">Back to Setup</a>
        </div>
      `;
      document.getElementById('leaderboard').innerHTML = '';
    }
  }

  // ── Identity modal ────────────────────────────────────────────────
  function showIdentityModal(roundPlayers, currentUserId) {
    const unclaimed = roundPlayers.filter(rp => !rp.user_id);
    const modal = document.getElementById('identityModal');
    const list  = document.getElementById('identityPlayerList');
    list.innerHTML = unclaimed.map(rp => `
      <button class="identity-player-btn" data-index="${rp.player_index}">${escHtml(rp.name)}</button>
    `).join('') || '<p style="color:rgba(245,240,232,0.5);font-size:0.9rem;">All player slots are taken.</p>';

    list.querySelectorAll('.identity-player-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const idx = parseInt(btn.dataset.index);
        const { error } = await window.sb
          .from('round_players')
          .update({ user_id: currentUserId })
          .eq('round_id', roundId)
          .eq('player_index', idx)
          .is('user_id', null);
        if (error) { showToast('Could not claim player — try again', true); return; }
        myPlayerIndex  = idx;
        isCommissioner = (myPlayerIndex === 0);
        modal.style.display = 'none';
        renderHole(currentHole);
      });
    });

    document.getElementById('identityWatchBtn').addEventListener('click', () => {
      myPlayerIndex = -1;
      modal.style.display = 'none';
    });

    modal.style.display = 'flex';
  }

  initRound();
</script>

<div class="toast" id="toast"></div>

<!-- HiO Full-Screen Overlay -->
<div id="hioOverlay" style="display:none;position:fixed;inset:0;background:var(--color-green);z-index:99999;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;">
  <div style="font-size:5rem;animation:hio-pulse 0.8s infinite;">⛳</div>
  <h1 style="font-family:'Bebas Neue',sans-serif;font-size:3.5rem;color:var(--color-gold);margin:16px 0 8px;letter-spacing:0.05em;">HOLE IN ONE!</h1>
  <p id="hioName" style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:#ffffff;letter-spacing:0.1em;margin-bottom:8px;"></p>
  <p style="font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--color-gold);letter-spacing:0.15em;">+44 POINTS</p>
  <button onclick="document.getElementById('hioOverlay').style.display='none'" style="margin-top:32px;font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:0.15em;text-transform:uppercase;background:transparent;border:1.5px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.6);padding:10px 28px;border-radius:4px;cursor:pointer;">Dismiss</button>
</div>

<!-- Vote Prompt -->
<div id="votePrompt" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--color-bg);border:1.5px solid var(--color-gold);border-radius:8px;padding:20px 24px;max-width:420px;width:90%;z-index:9000;flex-direction:column;gap:14px;align-items:center;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.12);">
  <p id="voteText" style="font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--color-text);line-height:1.5;"></p>
  <div style="display:flex;gap:10px;">
    <button onclick="castVote(true)"  style="flex:1;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.05em;background:var(--color-green);color:#ffffff;border:none;padding:12px;border-radius:4px;cursor:pointer;">HIT ✓</button>
    <button onclick="castVote(false)" style="flex:1;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.05em;background:var(--color-error);color:#ffffff;border:none;padding:12px;border-radius:4px;cursor:pointer;">MISS ✗</button>
  </div>
  <input type="hidden" id="votePiPlayerIndex">
  <input type="hidden" id="votePiHoleNumber">
</div>

<!-- Identity Modal -->
<div id="identityModal" style="display:none;position:fixed;inset:0;background:rgba(255,255,255,0.92);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px);">
  <div style="background:var(--color-bg);border:1px solid var(--color-border);border-radius:12px;padding:40px;max-width:420px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,0.1);">
    <p style="font-family:'Bebas Neue',sans-serif;font-size:0.75rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--color-gold);margin-bottom:8px;">Joining Round</p>
    <h2 style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--color-green);margin-bottom:8px;">Who Are You?</h2>
    <p style="font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--color-muted);margin-bottom:24px;">Select your name to claim your player slot.</p>
    <div id="identityPlayerList" style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;"></div>
    <button id="identityWatchBtn" style="background:transparent;border:1.5px solid var(--color-border);color:var(--color-muted);font-family:'Bebas Neue',sans-serif;font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;padding:10px 20px;cursor:pointer;border-radius:4px;width:100%;transition:border-color 0.15s;">Watch Only</button>
  </div>
</div>

<style>
  @keyframes hio-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
  .not-mine { opacity: 0.4; pointer-events: none; }
  .awaiting-vote-banner {
    font-family: var(--font-body); font-size: 0.82rem;
    color: var(--color-gold); padding: 8px 12px;
    background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px; margin-top: 6px;
  }
  .identity-player-btn {
    width: 100%; padding: 14px; font-family: var(--font-display);
    font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--color-green-tint); border: 1.5px solid var(--color-border);
    color: var(--color-text); cursor: pointer; border-radius: 4px;
    transition: background 0.15s, border-color 0.15s;
  }
  .identity-player-btn:hover { background: rgba(27,61,42,0.12); border-color: var(--color-green); color: var(--color-green); }
</style>

</body>
